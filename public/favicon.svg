<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Circular background -->
  <circle cx="50" cy="50" r="50" fill="#0a0a0f"/>

  <!-- Subtle red ring border -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#CC0000" stroke-width="1.5" opacity="0.55"/>

  <!-- JD centered — J white, D red outline -->
  <text
    x="44" y="65"
    font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif"
    font-size="58"
    font-weight="900"
    font-style="italic"
    text-anchor="middle"
    letter-spacing="-1"
  >
    <tspan fill="white">J</tspan><tspan fill="none" stroke="#CC0000" stroke-width="2.2">D</tspan>
  </text>

</svg>
